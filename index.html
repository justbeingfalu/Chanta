<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanta | Coming Soon</title>

    <!-- Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@200,300,400,500,600,700&display=swap"
        rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#FDFCF8',
                            charcoal: '#1C1C1C',
                            orange: '#F97316',
                            green: '#2D3A2D',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-color: #1C1C1C;
        }

        body {
            background-color: var(--bg-color);
            color: #FDFCF8;
            font-family: 'General Sans', sans-serif;
            overflow-x: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .accelerated {
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0);
        }

        /* Opening Section */
        #intro {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 50;
        }

        .scroll-text {
            font-size: clamp(1.5rem, 6vw, 4rem);
            font-weight: 200;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* Ticker Wrapper */
        .ticker-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
        }

        .ticker-container {
            display: flex;
            white-space: nowrap;
            align-items: center;
            padding-left: 30vw;
            /* Start with more space */
        }

        .word-box {
            display: inline-flex;
            align-items: center;
            opacity: 0;
            transform: translateY(20px);
            margin-right: clamp(1rem, 4vw, 3rem);
        }

        /* Logo box stays visible/clear */
        .logo-box {
            display: inline-flex;
            align-items: center;
            opacity: 1;
            transform: none;
            margin-right: clamp(1rem, 4vw, 3rem);
        }

        .ticker-text-block {
            display: flex;
            align-items: center;
            font-size: clamp(3rem, 12vw, 12rem);
            font-weight: 700;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -0.04em;
        }

        /* Styles */
        .real-magic {
            font-style: italic;
            font-weight: 900;
            color: #D4AF37;
        }

        .refreshment {
            color: #F97316;
        }

        .together {
            font-style: italic;
            font-weight: 300;
        }

        /* Closing Section */
        #outro {
            height: 100vh;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
            background-color: #F97316;
            opacity: 0;
            pointer-events: none;
        }

        .outro-content {
            text-align: center;
            transform: scale(0.9);
            opacity: 0;
            padding: 2rem;
        }

        /* Icons */
        .juice-logo {
            height: 0.8em;
            margin: 0 0.2em;
            filter: brightness(0) invert(1);
        }

        .sparkle {
            color: #D4AF37;
            width: 0.7em;
            fill: currentColor;
            margin: 0 0.1em;
        }

        /* HUD Logo */
        .hud-logo {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            width: clamp(40px, 5vw, 60px);
            opacity: 0.3;
            mix-blend-difference: exclusion;
        }
    </style>
</head>

<body>
    <div style="height: 1000vh;"></div>

    <!-- 1. INTRO -->
    <section id="intro" class="accelerated">
        <div class="scroll-text">Scroll</div>
    </section>

    <!-- 2. TICKER (SINGLE PASS) -->
    <div class="ticker-wrapper accelerated" id="ticker-wrap">
        <div class="ticker-container accelerated" id="ticker">
            <div class="ticker-text-block">
                <div class="word-box">In</div>
                <div class="word-box">every</div>
                <div class="logo-box"><img src="logo-transparent.png" alt="Chanta" class="juice-logo"></div>
                <div class="word-box">bottle,</div>
                <div class="word-box">discover</div>
                <div class="word-box">the</div>
                <div class="word-box">undeniable</div>
                <div class="word-box"><span class="real-magic">Real Magic</span></div>
                <div class="word-box"><svg viewBox="0 0 24 24" class="sparkle">
                        <path d="M12,2L14.8,8.2L21,11L14.8,13.8L12,20L9.2,13.8L3,11L9.2,8.2L12,2Z" />
                    </svg></div>
                <div class="word-box">of</div>
                <div class="word-box">sharing</div>
                <div class="word-box">pure</div>
                <div class="word-box"><span class="refreshment">Refreshment</span></div>
                <div class="word-box">that</div>
                <div class="word-box">brings</div>
                <div class="word-box">us</div>
                <div class="word-box"><span class="together">Together</span></div>
            </div>
        </div>
    </div>

    <!-- 3. OUTRO -->
    <section id="outro" class="accelerated">
        <div class="outro-content accelerated">
            <img src="logo-transparent.png" alt="Chanta" class="w-32 md:w-64 mx-auto mb-6 filter brightness(0) invert">
            <h2 class="text-2xl md:text-4xl font-bold uppercase tracking-widest italic opacity-80">Coming
                soon...<br>Ahh.. Chanta!</h2>
        </div>
    </section>

    <img src="logo-transparent.png" alt="Chanta" class="hud-logo filter brightness-0 invert pointer-events-none">

    <script>
        gsap.registerPlugin(ScrollTrigger);

        const lenis = new Lenis({
            duration: 1.2,
            smoothWheel: true,
            touchMultiplier: 2,
        });

        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => lenis.raf(time * 1000));
        gsap.ticker.lagSmoothing(0);

        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: 1,
                invalidateOnRefresh: true
            }
        });

        // 1. Intro fades out
        tl.to("#intro", { opacity: 0, scale: 1.1, duration: 1 });

        // 2. Ticker fades in
        tl.to("#ticker-wrap", { opacity: 1, duration: 0.5 }, "-=0.3");

        // 3. Narrative Flow
        const words = gsap.utils.toArray(".word-box");
        const ticker = document.querySelector('#ticker');
        const scrollDistance = ticker.scrollWidth - window.innerWidth + (window.innerWidth * 0.2);

        // Move the container
        tl.to("#ticker", {
            x: -scrollDistance,
            ease: "none",
            duration: 20 // Slower for readability
        }, "tickerStart");

        // Stagger the entrance of each word box (EXCEPT the logo box)
        words.forEach((word, i) => {
            tl.to(word, {
                opacity: 1,
                y: 0,
                duration: 1.5,
                ease: "power2.out"
            }, `tickerStart+=${i * 0.8}`); // More deliberate stagger
        });

        // 4. Hold on "Together"
        tl.to({}, { duration: 5 }); // Empty tween for hold

        // 5. Fade out ticker wrap
        tl.to("#ticker-wrap", { opacity: 0, y: -20, duration: 2 });

        // 6. Orange Outro bursts in
        tl.fromTo("#outro",
            { opacity: 0, scale: 1.2 },
            { opacity: 1, scale: 1, duration: 2 }
        );
        tl.to(".outro-content", { opacity: 1, scale: 1, duration: 1 }, "-=1.5");

        // 7. Orange transitions to Green
        tl.to("#outro", { backgroundColor: "#2D3A2D", duration: 4 }, "+=1");

        // Sparkle rotation
        gsap.to(".sparkle", { rotation: 360, duration: 10, repeat: -1, ease: "none" });

        window.addEventListener('resize', () => ScrollTrigger.refresh());
    </script>
</body>

</html>
