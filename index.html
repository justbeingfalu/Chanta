<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanta | Coming Soon</title>

    <!-- Fonts -->
    <link href="https://api.fontshare.com/v2/css?f[]=general-sans@200,300,400,500,600,700&display=swap"
        rel="stylesheet">

    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            bg: '#FDFCF8',
                            charcoal: '#1C1C1C',
                            red: '#E11D48',
                            orange: '#F97316',
                            green: '#2D3A2D',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --bg-color: #1C1C1C;
        }

        body {
            background-color: var(--bg-color);
            color: #FDFCF8;
            font-family: 'General Sans', sans-serif;
            overflow-x: hidden;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* Hardware acceleration */
        .accelerated {
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0);
        }

        /* Opening Section */
        #intro {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 50;
        }

        .scroll-text {
            font-size: clamp(1.5rem, 6vw, 4rem);
            font-weight: 200;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        /* Ticker Wrapper */
        .ticker-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
        }

        .ticker-container {
            display: flex;
            white-space: nowrap;
            align-items: center;
        }

        .ticker-text {
            display: flex;
            align-items: center;
            font-size: clamp(3rem, 12vw, 12rem);
            font-weight: 700;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            padding-right: 2rem;
        }

        /* Styles */
        .real-magic {
            font-style: italic;
            font-weight: 900;
            color: #D4AF37;
        }

        .refreshment {
            color: #F97316;
        }

        .together {
            font-style: italic;
            font-weight: 300;
        }

        /* Closing Section */
        #outro {
            height: 100vh;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
            background-color: #E11D48;
            opacity: 0;
            pointer-events: none;
        }

        .outro-content {
            text-align: center;
            transform: scale(0.9);
            opacity: 0;
            padding: 2rem;
        }

        /* Icons */
        .juice-logo {
            height: 0.8em;
            margin: 0 0.2em;
            filter: brightness(0) invert(1);
        }

        .sparkle {
            color: #D4AF37;
            width: 0.7em;
            fill: currentColor;
            margin: 0 0.1em;
        }

        /* HUD Logo */
        .hud-logo {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            width: clamp(40px, 5vw, 60px);
            opacity: 0.3;
            mix-blend-difference: exclusion;
        }

        /* Hide footer on mobile if crowded */
        @media (max-width: 640px) {
            .ticker-text {
                padding-right: 1rem;
            }

            .mx-4 {
                margin-left: 0.5rem;
                margin-right: 0.5rem;
            }
        }
    </style>
</head>

<body>
    <!-- Scroll depth manager - Reduced for snappier feel -->
    <div style="height: 700vh;"></div>

    <!-- 1. INTRO -->
    <section id="intro" class="accelerated">
        <div class="scroll-text">Scroll</div>
    </section>

    <!-- 2. TICKER -->
    <div class="ticker-wrapper accelerated" id="ticker-wrap">
        <div class="ticker-container accelerated" id="ticker">
            <div class="ticker-text">
                <span>In every</span>
                <img src="logo-transparent.png" alt="Chanta" class="juice-logo">
                <span>bottle, discover the undeniable</span>
                <span class="real-magic mx-2 md:mx-4">Real Magic</span>
                <svg viewBox="0 0 24 24" class="sparkle">
                    <path d="M12,2L14.8,8.2L21,11L14.8,13.8L12,20L9.2,13.8L3,11L9.2,8.2L12,2Z" />
                </svg>
                <span>of sharing pure</span>
                <span class="refreshment mx-2 md:mx-4">Refreshment</span>
                <span>that brings us</span>
                <span class="together mx-2 md:mx-4">Together</span>
            </div>
            <!-- Duplicate for continuity -->
            <div class="ticker-text">
                <span>In every</span>
                <img src="logo-transparent.png" alt="Chanta" class="juice-logo">
                <span>bottle, discover the undeniable</span>
                <span class="real-magic mx-2 md:mx-4">Real Magic</span>
                <span>of sharing pure</span>
                <span class="refreshment mx-2 md:mx-4">Refreshment</span>
                <span>that brings us</span>
                <span class="together mx-2 md:mx-4">Together</span>
            </div>
        </div>
    </div>

    <!-- 3. OUTRO -->
    <section id="outro" class="accelerated">
        <div class="outro-content accelerated">
            <img src="logo-transparent.png" alt="Chanta" class="w-32 md:w-64 mx-auto mb-6 filter brightness-0 invert">
            <h2 class="text-2xl md:text-4xl font-bold uppercase tracking-widest italic opacity-80">Sigh... Ah, Chanta.
            </h2>
        </div>
    </section>

    <img src="logo-transparent.png" alt="Chanta" class="hud-logo filter brightness-0 invert pointer-events-none">

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // Lenis Smooth Scroll - Optimized for performance
        const lenis = new Lenis({
            duration: 1, // Faster duration
            smoothWheel: true,
            touchMultiplier: 2, // Better mobile feel
            infinite: false
        });

        lenis.on('scroll', ScrollTrigger.update);
        gsap.ticker.add((time) => lenis.raf(time * 1000));
        gsap.ticker.lagSmoothing(0);

        // Master Timeline - Optimized with scrub: true
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: "body",
                start: "top top",
                end: "bottom bottom",
                scrub: true, // More direct response
                invalidateOnRefresh: true
            }
        });

        // 1. Intro fades out quickly
        tl.to("#intro", { opacity: 0, y: -20, duration: 1 });

        // 2. Ticker fades in & scrolls
        tl.to("#ticker-wrap", { opacity: 1, duration: 1 }, "-=0.5");
        tl.to("#ticker", {
            x: () => -(document.querySelector('#ticker').scrollWidth - window.innerWidth),
            ease: "none",
            duration: 10
        });

        // 3. Ticker fades out
        tl.to("#ticker-wrap", { opacity: 0, y: 20, duration: 1 });

        // 4. Red Outro bursts in
        tl.fromTo("#outro",
            { opacity: 0, scale: 1.2 },
            { opacity: 1, scale: 1, duration: 1 },
            "-=0.5"
        );
        tl.to(".outro-content", { opacity: 1, scale: 1, duration: 0.5 }, "-=0.5");

        // 5. Red transitions to Green
        tl.to("#outro", { backgroundColor: "#2D3A2D", duration: 2 }, "+=0.5");

        // Simple rotation for sparkle - low perf cost
        gsap.to(".sparkle", { rotation: 360, duration: 10, repeat: -1, ease: "none" });

        // Refresh ScrollTrigger on resize to handle mobile orientation shifts
        window.addEventListener('resize', () => ScrollTrigger.refresh());

    </script>
</body>

</html>
